<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 智盾</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:"Microsoft YaHei UI","PingFang SC",sans-serif;color:#000;background:linear-gradient(#eaeaea 1px,transparent 1px),linear-gradient(90deg,#eaeaea 1px,transparent 1px),radial-gradient(circle at 50% -10%,rgba(0,0,0,.055),transparent 34%),#fafafa;background-size:44px 44px,44px 44px,auto,auto}.nav{height:64px;border-bottom:1px solid #eaeaea;background:rgba(250,250,250,.86);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1120px)/2));position:sticky;top:0}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#000;font-weight:900}.glyph{width:24px;height:24px;background:#000;clip-path:polygon(50% 0,92% 22%,83% 78%,50% 100%,17% 78%,8% 22%)}.nav a{color:#666;text-decoration:none;font-weight:800}.shell{width:min(1120px,calc(100vw - 32px));min-height:calc(100vh - 64px);margin:0 auto;display:grid;grid-template-columns:1.1fr 420px;align-items:center;gap:1px}.hero,.panel{background:#fff;border:1px solid #eaeaea;min-height:560px}.hero{padding:56px;display:flex;flex-direction:column;justify-content:space-between}.kicker{font-family:Consolas,monospace;color:#8f8f8f;letter-spacing:.16em;font-size:.76rem;font-weight:900}.hero h1{font-size:clamp(3.2rem,7vw,6.4rem);line-height:.9;letter-spacing:-.08em;margin-top:18px}.hero p{color:#666;line-height:1.8;font-size:1.05rem;max-width:560px;margin-top:22px}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:26px}.chips span{border:1px solid #eaeaea;border-radius:999px;padding:8px 12px;color:#666;font-weight:800;font-size:.86rem}.panel{padding:42px;display:flex;flex-direction:column;justify-content:center;gap:18px}.panel h2{font-size:2rem;letter-spacing:-.05em}.muted{color:#666;line-height:1.7}.field{display:grid;gap:8px}.field label{font-weight:900}.field input{border:1px solid #d4d4d4;border-radius:10px;padding:14px;outline:none}.field input:focus{border-color:#000;box-shadow:0 0 0 3px rgba(0,0,0,.06)}.error{display:none;background:#fff3f1;color:#d92d20;border:1px solid rgba(217,45,32,.24);padding:12px;border-radius:10px}.primary,.secondary{min-height:44px;border-radius:8px;font-weight:900;cursor:pointer}.primary{border:1px solid #000;background:#000;color:#fff}.secondary{display:inline-flex;align-items:center;justify-content:center;border:1px solid #d4d4d4;background:#fff;color:#000;text-decoration:none}.bottom{display:flex;justify-content:space-between;gap:12px;align-items:center}@media(max-width:860px){.shell{grid-template-columns:1fr}.hero,.panel{min-height:auto}.hero{padding:34px}.panel{padding:34px}}
  </style>
</head>
<body>
  <header class="nav"><a class="brand" href="/"><span class="glyph"></span>智盾</a><a href="/register">注册</a></header>
  <main class="shell">
    <section class="hero"><div><div class="kicker">SMARTSHIELD ACCESS</div><h1>登录<br>工作台</h1><p>进入聊天诈骗识别系统，保存检测历史，调用本地模型和 Qwen API 进行风险研判。</p><div class="chips"><span>本地检测</span><span>历史回溯</span><span>模型对比</span></div></div><p class="muted">Fraud detection infrastructure for Chinese chat scenarios.</p></section>
    <section class="panel"><div><h2>欢迎回来</h2><p class="muted">登录后可进行检测并查看个人历史。</p></div><div id="authError" class="error"></div><div class="field"><label for="username">用户名</label><input id="username" autocomplete="username" placeholder="请输入用户名"></div><div class="field"><label for="password">密码</label><input id="password" type="password" autocomplete="current-password" placeholder="请输入密码"></div><button id="loginBtn" class="primary">登录</button><div class="bottom"><span class="muted">还没有账号？</span><a class="secondary" href="/register" style="padding:0 14px;">创建账号</a></div></section>
  </main>
<script>
async function safeJson(url, options={}){const r=await fetch(url,{credentials:'same-origin',...options});const d=await r.json();return{r,d}}function showError(msg){const el=document.getElementById('authError');el.textContent=msg;el.style.display='block'}async function checkAuth(){try{const{d}=await safeJson('/api/me');if(d.ok&&d.user)location.href='/'}catch(e){}}async function login(){const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;if(!username||!password)return showError('请输入用户名和密码');try{const{d}=await safeJson('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});if(!d.ok)return showError(d.error||'登录失败');location.href='/'}catch(e){showError(e.message||'网络错误')}}document.getElementById('loginBtn').addEventListener('click',login);document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});checkAuth();
</script>
</body>
</html>
