<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 智盾</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:"Microsoft YaHei UI","PingFang SC",sans-serif;color:#000;background:linear-gradient(#eaeaea 1px,transparent 1px),linear-gradient(90deg,#eaeaea 1px,transparent 1px),radial-gradient(circle at 50% -10%,rgba(0,0,0,.055),transparent 34%),#fafafa;background-size:44px 44px,44px 44px,auto,auto}.nav{height:64px;border-bottom:1px solid #eaeaea;background:rgba(250,250,250,.86);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1120px)/2));position:sticky;top:0}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#000;font-weight:900}.glyph{width:24px;height:24px;background:#000;clip-path:polygon(50% 0,92% 22%,83% 78%,50% 100%,17% 78%,8% 22%)}.nav a{color:#666;text-decoration:none;font-weight:800}.shell{width:min(1120px,calc(100vw - 32px));min-height:calc(100vh - 64px);margin:0 auto;display:grid;grid-template-columns:1.1fr 440px;align-items:center;gap:1px}.hero,.panel{background:#fff;border:1px solid #eaeaea;min-height:610px}.hero{padding:56px;display:flex;flex-direction:column;justify-content:space-between}.kicker{font-family:Consolas,monospace;color:#8f8f8f;letter-spacing:.16em;font-size:.76rem;font-weight:900}.hero h1{font-size:clamp(3.2rem,7vw,6.4rem);line-height:.9;letter-spacing:-.08em;margin-top:18px}.hero p{color:#666;line-height:1.8;font-size:1.05rem;max-width:560px;margin-top:22px}.panel{padding:42px;display:flex;flex-direction:column;justify-content:center;gap:16px}.panel h2{font-size:2rem;letter-spacing:-.05em}.muted{color:#666;line-height:1.7}.field{display:grid;gap:8px}.field label{font-weight:900}.field input{border:1px solid #d4d4d4;border-radius:10px;padding:14px;outline:none;width:100%}.field input:focus{border-color:#000;box-shadow:0 0 0 3px rgba(0,0,0,.06)}.captcha{display:grid;grid-template-columns:1fr 150px;gap:10px}.captcha-img{height:52px;border:1px solid #d4d4d4;border-radius:10px;background:#fff;display:grid;place-items:center;overflow:hidden;cursor:pointer}.error{display:none;background:#fff3f1;color:#d92d20;border:1px solid rgba(217,45,32,.24);padding:12px;border-radius:10px}.primary,.secondary{min-height:44px;border-radius:8px;font-weight:900;cursor:pointer}.primary{border:1px solid #000;background:#000;color:#fff}.secondary{display:inline-flex;align-items:center;justify-content:center;border:1px solid #d4d4d4;background:#fff;color:#000;text-decoration:none}.bottom{display:flex;justify-content:space-between;gap:12px;align-items:center}@media(max-width:860px){.shell{grid-template-columns:1fr}.hero,.panel{min-height:auto}.hero{padding:34px}.panel{padding:34px}.captcha{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="nav"><a class="brand" href="/"><span class="glyph"></span>智盾</a><a href="/login">登录</a></header>
  <main class="shell">
    <section class="hero"><div><div class="kicker">CREATE SMARTSHIELD ACCOUNT</div><h1>创建<br>账号</h1><p>注册后即可保存个人检测历史、回看原始输入，并在同一工作台中比较不同模型的检测结果。</p></div><p class="muted">Captcha protected local account creation.</p></section>
    <section class="panel"><div><h2>注册新用户</h2><p class="muted">验证码不区分大小写，点击图片可刷新。</p></div><div id="authError" class="error"></div><div class="field"><label for="username">用户名</label><input id="username" autocomplete="username" placeholder="请输入用户名"></div><div class="field"><label for="password">密码</label><input id="password" type="password" autocomplete="new-password" placeholder="请输入密码"></div><div class="field"><label for="captchaInput">图形字母验证码</label><div class="captcha"><input id="captchaInput" placeholder="输入验证码"><div id="captchaImage" class="captcha-img" title="点击刷新"></div></div></div><button id="registerBtn" class="primary">注册并进入系统</button><div class="bottom"><span class="muted">已有账号？</span><a class="secondary" href="/login" style="padding:0 14px;">返回登录</a></div></section>
  </main>
<script>
let captchaToken='';async function safeJson(url,options={}){const r=await fetch(url,{credentials:'same-origin',...options});const d=await r.json();return{r,d}}function showError(msg){const el=document.getElementById('authError');el.textContent=msg;el.style.display='block'}async function loadCaptcha(){try{const{d}=await safeJson('/api/captcha');captchaToken=d.token;document.getElementById('captchaImage').innerHTML=d.svg}catch(e){showError('验证码加载失败：'+e.message)}}async function register(){const username=document.getElementById('username').value.trim();const password=document.getElementById('password').value;const captcha=document.getElementById('captchaInput').value.trim();if(!username||!password||!captcha)return showError('请完整填写注册信息和验证码');try{const{d}=await safeJson('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,captcha,captcha_token:captchaToken})});if(!d.ok){await loadCaptcha();return showError(d.error||'注册失败')}location.href='/'}catch(e){showError(e.message||'网络错误')}}document.getElementById('captchaImage').addEventListener('click',loadCaptcha);document.getElementById('registerBtn').addEventListener('click',register);document.addEventListener('keydown',e=>{if(e.key==='Enter')register()});loadCaptcha();
</script>
</body>
</html>
